services:
  careconnect-h5:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: careconnect-h5:latest
    container_name: careconnect-h5
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:80"
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
